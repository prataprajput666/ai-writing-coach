<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Writing Coach Pro</title>

<style>

body{
background:linear-gradient(135deg,#0f172a,#1e1b4b,#111827);
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
color:white;
}

.container{
width:100%;
max-width:850px;
background:rgba(255,255,255,0.08);
padding:30px;
border-radius:25px;
backdrop-filter:blur(15px);
}

h1{
text-align:center;
font-size:40px;
color:#38bdf8;
}

textarea{
width:100%;
height:180px;
margin-top:20px;
padding:20px;
font-size:18px;
border:none;
border-radius:20px;
background:#111827;
color:white;
resize:none;
}

button{
width:100%;
padding:16px;
margin-top:20px;
border:none;
border-radius:20px;
font-size:18px;
font-weight:bold;
cursor:pointer;
background:linear-gradient(to right,#38bdf8,#8b5cf6);
color:white;
}

.result{
margin-top:25px;
background:#111827;
padding:20px;
border-radius:20px;
line-height:1.8;
}

</style>

</head>

<body>

<div class="container">

<h1>AI Writing Coach Pro</h1>

<textarea id="input"
placeholder="Write something..."></textarea>

<button onclick="improveText()">
Improve Writing
</button>

<div class="result" id="output">
AI response will appear here...
</div>

</div>

<script>

const API_KEY = "AIzaSyChUWKEURv_e_OPNXy0XUA_Lv2fabUZbP8";

async function improveText(){

let text =
document.getElementById("input").value;

if(text.trim()==""){

document.getElementById("output").innerHTML =
"Please enter text.";

return;
}

document.getElementById("output").innerHTML =
"Analyzing...";

try{

const response = await fetch(
`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`,
{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

contents:[{
parts:[{
text:
"Correct grammar and improve vocabulary professionally: " + text
}]
}]

})

});

const data = await response.json();

const result =
data.candidates[0].content.parts[0].text;

document.getElementById("output").innerHTML =
result;

}
catch(error){

document.getElementById("output").innerHTML =
"Error connecting AI.";

}

}

</script>

</body>
</html>
