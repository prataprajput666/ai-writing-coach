<!DOCTYPE html>
<html>
<head>
<title>AI Writing Coach</title>

<style>
body{
background:#0f172a;
color:white;
font-family:Arial;
padding:20px;
}

h1{
text-align:center;
color:#38bdf8;
}

textarea{
width:100%;
height:180px;
padding:15px;
border:none;
border-radius:12px;
font-size:18px;
background:#1e293b;
color:white;
}

button{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:12px;
background:#38bdf8;
font-size:18px;
font-weight:bold;
}

.box{
background:#1e293b;
padding:15px;
border-radius:12px;
margin-top:20px;
}
</style>
</head>

<body>

<h1>AI Writing Coach</h1>

<textarea id="input" placeholder="Write here..."></textarea>

<button onclick="improveText()">
Improve Writing
</button>

<div class="box">
<h3>Improved Text</h3>
<p id="output">Result will appear here...</p>
</div>

<script>
function improveText(){

let text=document.getElementById("input").value;

if(text==""){
document.getElementById("output").innerHTML=
"Please enter text";
return;
}

let improved=text
.replace(/ i /g," I ")
.replace(/dont/g,"don't")
.replace(/cant/g,"can't");

document.getElementById("output").innerHTML=
improved;
}
</script>

</body>
</html>
