<script>

function improveText() {

let text = document.getElementById("input").value;

if(text.trim() === ""){
document.getElementById("output").innerHTML =
"Please enter some text.";
return;
}

let improved = text;

// Common corrections
const corrections = {

"i":"I",
"im":"I'm",
"dont":"don't",
"cant":"can't",
"wont":"won't",
"didnt":"didn't",
"doesnt":"doesn't",
"isnt":"isn't",
"arent":"aren't",
"ive":"I've",
"ill":"I'll",
"idk":"I don't know",
"u":"you",
"ur":"your",
"pls":"please",
"plz":"please",
"thx":"thanks",
"msg":"message",
"becoz":"because",
"bcz":"because",
"luv":"love",
" gud ":" good ",
" frnd ":" friend ",
" wanna ":" want to ",
" gonna ":" going to "

};

// Replace words
for (let word in corrections) {

let regex = new RegExp("\\b" + word + "\\b","gi");

improved = improved.replace(regex, corrections[word]);
}

// Remove extra spaces
improved = improved.replace(/\s+/g," ").trim();

// Capitalize sentence beginnings
improved = improved.replace(/(^\w|\.\s+\w)/g,
function(letter){
return letter.toUpperCase();
});

// Add punctuation if missing
if(!/[.!?]$/.test(improved)){
improved += ".";
}

// Improve readability
improved = improved
.replace(/ very very /gi," extremely ")
.replace(/ really really /gi," really ")
.replace(/ alot /gi," a lot ")
.replace(/awsome/gi,"awesome")
.replace(/goood/gi,"good");

// Output
document.getElementById("output").innerHTML = improved;

}

</script>
